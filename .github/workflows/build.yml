name: Build Resume PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-resume:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-extra \
            texlive-fonts-recommended \
            texlive-lang-european \
            texlive-pictures

      - name: Update last updated date
        run: |
          CURRENT_DATE="$(date -u '+%B %Y')"
          sed -i "s/\\\\newcommand{\\\\lastupdated}{.*}/\\\\newcommand{\\\\lastupdated}{$CURRENT_DATE}/" main.tex

      - name: Compile PDF
        run: |
          pdflatex -interaction=nonstopmode -halt-on-error main.tex
          pdflatex -interaction=nonstopmode -halt-on-error main.tex

      - name: Rename PDF
        run: |
          mv main.pdf acortino_resume.pdf

      - name: Commit PDF
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add acortino_resume.pdf main.tex

          git diff --cached --quiet && exit 0

          git commit -m "chore: update resume pdf"
          git push
